<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Ultimate Bookmarks Manager</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <h1>Ultimate Bookmarks Manager</h1>

    <button id="sort-button" class="default-box-shadow">Sort Bookmarks</button>

    <div id="search" class="default-box-shadow">
      <input type="text" id="search__input" placeholder="Search bookmarks..." />
      <button id="search__clear-button">x</button>
    </div>

    <div id="navigate">
      <div id="navigate__header">
        <button id="navigate__header__back-button">⬅ Back</button>
        <h3 id="navigate__header__path-tile">Bookmarks</h3>
      </div>

      <div id="navigate__bookmark-list"></div>
    </div>

    <script src="scripts/popup.js" type="module"></script>
    <script src="scripts/navigate.js" type="module"></script>
  </body>
</html>
